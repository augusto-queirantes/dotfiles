# ─── Server / terminal ───────────────────────────────────────────────────────
# True color + italics. Alacritty advertises xterm-256color; tmux upgrades to
# tmux-256color internally and overrides Tc/RGB so true color works in panes.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,alacritty:RGB"
set -ga terminal-features ",alacritty:RGB,xterm-256color:RGB"

set -sg escape-time 10               # snappy ESC for nvim, but not 0 (flaky over ssh)
set -g  history-limit 100000
set -g  display-time 3000
set -g  focus-events on              # nvim autoread + gitsigns refresh
set -g  mouse on
setw -g aggressive-resize on

# Extended keys (CSI-u) — required for Shift-Enter / Ctrl-Enter / etc to reach
# inner applications like Claude Code, Neovim, Helix. Alacritty sends
# `ESC[13;2u` for Shift-Enter; without this tmux strips it.
set -s  extended-keys always
set -as terminal-features 'xterm*:extkeys,alacritty:extkeys'

# OSC 52 system-clipboard sync (works locally and over SSH; alacritty has osc52=CopyPaste)
set -g set-clipboard on
set -g allow-passthrough on

# ─── Indexing & windows ──────────────────────────────────────────────────────
set -g  base-index 1
setw -g pane-base-index 1
set -g  renumber-windows on
set -g  detach-on-destroy off        # closing last window jumps to another session
set -g  monitor-activity on
set -g  visual-activity off

# ─── Prefix: Ctrl-a ──────────────────────────────────────────────────────────
# C-a (not the default C-b, and not C-Space which Raycast claims globally on
# macOS via RegisterEventHotKey). Trade-off: shadows readline's
# beginning-of-line — use Home, or `prefix a` to send a literal C-a through.
unbind C-b
set -g prefix C-a
bind C-a send-prefix                 # press twice to forward to a nested tmux
bind a   send-prefix                 # `prefix a` → literal C-a to the shell
bind Space last-window               # prefix Space → toggle last window

# ─── Reload / edit conf ──────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"
bind e new-window -n "conf" "\${EDITOR:-nvim} ~/.config/tmux/tmux.conf"

# ─── Splits & windows (open in current pane's $PWD) ──────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -fh -c "#{pane_current_path}"   # full-width vertical split
bind _ split-window -fv -c "#{pane_current_path}"    # full-height horizontal split
bind c new-window -c "#{pane_current_path}"
bind x kill-pane
bind X kill-window

# ─── vim-tmux-navigator (Ctrl-h/j/k/l between vim splits and tmux panes) ─────
# Sends C-h/j/k/l through to vim when a vim process owns the pane; otherwise
# moves between tmux panes. Mirrors christoomey/vim-tmux-navigator.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\\\S+\\\\/)?g?\\.?(view|n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
# C-l is stolen by the navigator above, so re-expose readline clear-screen via prefix.
bind C-l send-keys 'C-l'

# ─── Pane resize ─────────────────────────────────────────────────────────────
# Repeatable with prefix (-r) — hold prefix once, hammer H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5
# No-prefix Alt-arrows (option_as_alt=Both in alacritty)
bind -n M-Left  resize-pane -L 5
bind -n M-Down  resize-pane -D 3
bind -n M-Up    resize-pane -U 3
bind -n M-Right resize-pane -R 5

# Cycle layouts; swap panes
bind -r Space next-layout
bind > swap-pane -D
bind < swap-pane -U

# ─── Sessions ────────────────────────────────────────────────────────────────
bind s choose-tree -Zs                                 # session picker w/ zoom
bind w choose-tree -Zw                                 # window picker w/ zoom
bind S command-prompt -p "rename session:" "rename-session '%%'"
bind W command-prompt -p "rename window:"  "rename-window '%%'"
bind D detach-client

# Sessionizer popup (bin/tmux-sessionizer is symlinked into ~/.local/bin)
bind f display-popup -E -w 70% -h 70% -T " sessionizer " "tmux-sessionizer"

# Quick popup shell (anywhere → drop into a scratch zsh on the session's $PWD)
bind ! display-popup -E -w 80% -h 80% -d "#{pane_current_path}" -T " scratch "

# Lazygit popup
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" -T " lazygit " "lazygit"

# ─── Copy mode (vi) ──────────────────────────────────────────────────────────
setw -g mode-keys vi
set  -g status-keys emacs
bind Enter copy-mode
bind p paste-buffer
bind P choose-buffer -Z
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "pbcopy"

# ─── Status bar — Tokyo Night Moon ───────────────────────────────────────────
# Palette: bg=#222436 fg=#c8d3f5 dim=#828bb8 selection=#2d3f76
#          red=#ff757f green=#c3e88d yellow=#ffc777
#          blue=#82aaff magenta=#c099ff cyan=#86e1fc
set -g status on
set -g status-interval 5
set -g status-position top
set -g status-justify left
set -g status-style "bg=#1e2030,fg=#c8d3f5"

# Left: session name
set -g status-left-length 60
set -g status-left "#[fg=#1e2030,bg=#c099ff,bold] #S #[fg=#c099ff,bg=#1e2030]  "

# Window list
set -g window-status-separator ""
set -g window-status-format         "#[fg=#828bb8,bg=#1e2030] #I:#W#{?window_flags,#{window_flags}, } "
set -g window-status-current-format "#[fg=#1e2030,bg=#82aaff] #[fg=#1e2030,bg=#82aaff,bold]#I:#W#{?window_flags,#{window_flags}, } #[fg=#82aaff,bg=#1e2030]"
set -g window-status-activity-style "fg=#ffc777,bg=#1e2030"
set -g window-status-bell-style     "fg=#ff757f,bg=#1e2030,bold"

# Right: prefix indicator + host + time
set -g status-right-length 80
set -g status-right "#{?client_prefix,#[fg=#ff757f#,bold] PREFIX ,}#[fg=#c3e88d,bg=#1e2030] #h #[fg=#828bb8,bg=#1e2030]│ #[fg=#86e1fc]%a %d %b #[fg=#828bb8]│ #[fg=#ffc777]%H:%M "

# Pane borders + active-pane visual cue
set -g pane-border-style        "fg=#444a73"
set -g pane-active-border-style "fg=#82aaff"
set -g display-panes-colour        "#828bb8"
set -g display-panes-active-colour "#c099ff"

# Messages / command prompt
set -g message-style          "bg=#2d3f76,fg=#c8d3f5,bold"
set -g message-command-style  "bg=#2d3f76,fg=#c8d3f5,bold"
set -g mode-style             "bg=#2d3f76,fg=#c099ff,bold"

# ─── Plugins (TPM) ───────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'wfxr/tmux-fzf-url'

# tmux-resurrect: capture pane contents and restore nvim sessions on attach
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum: auto-save every 15m, auto-restore on tmux server start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux-yank: stay in copy mode after yanking (don't jump to bottom)
set -g @yank_action 'copy-pipe-no-clear'

# tmux-fzf-url: opens URLs from current pane in fzf popup → opener
set -g @fzf-url-bind 'u'
set -g @fzf-url-fzf-options '-w 70% -h 50% --multi -0 --no-preview --no-border'
set -g @fzf-url-history-limit '2000'

# Initialize TPM (must stay last)
run '~/.config/tmux/plugins/tpm/tpm'
